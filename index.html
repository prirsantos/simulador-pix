<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de PIX - Escola</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-100 font-sans flex justify-center items-start min-h-screen sm:items-center">

    <!-- Mobile Screen Frame -->
    <div class="w-full max-w-md bg-white min-h-screen sm:min-h-[850px] sm:rounded-3xl sm:shadow-2xl flex flex-col justify-between overflow-hidden border border-slate-200">
        
        <!-- Header: Deep Blue (Haiti/Brazil) with Yellow (Brazil) Badge -->
        <header class="bg-[#002060] text-white p-6 shadow-md border-b-4 border-[#009b3a]">
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-xs uppercase tracking-wider text-slate-300 font-bold">Simulador Escolar</p>
                    <h1 class="text-2xl font-black tracking-tight">NOSSO BANCO</h1>
                </div>
                <!-- Yellow Badge with Red Border (Haiti/Brazil integration) -->
                <span class="bg-[#fedf00] text-[#002060] text-xs font-black px-3 py-1.5 rounded-full border border-red-600 shadow">
                    MODO TREINO
                </span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 p-6 flex flex-col justify-between gap-6">

            <!-- TELA 1: DASHBOARD (TELA INICIAL) -->
            <div id="tela-inicial" class="flex flex-col gap-8 h-full justify-between flex-1">
                
                <!-- Balance Box: Dark Blue border, Green details for money -->
                <div class="bg-slate-50 p-6 rounded-2xl border-2 border-[#002060] shadow-sm">
                    <div class="flex items-center gap-2 text-[#002060] mb-1">
                        <i data-lucide="wallet" class="w-5 h-5 text-[#009b3a]"></i>
                        <span class="text-sm font-bold uppercase tracking-wide">Seu Dinheiro na Conta:</span>
                    </div>
                    <!-- Big, highly readable balance -->
                    <p class="text-4xl font-black text-slate-900">R$ 1.800,00</p>
                    <p class="text-xs text-[#009b3a] mt-2 font-bold uppercase tracking-wider">Este dinheiro é para treinar!</p>
                </div>

                <!-- Main PIX Button: Deep Blue with Yellow Highlight -->
                <div class="flex flex-col gap-4">
                    <p class="text-lg font-bold text-slate-700">O que você quer fazer hoje?</p>
                    
                    <button onclick="irParaTela('tela-escolha-chave')" 
                            class="w-full bg-[#002060] hover:bg-[#001540] active:bg-black text-white rounded-2xl p-6 flex items-center justify-between shadow-lg transition-all border-b-4 border-red-600 active:border-b-0">
                        <div class="flex items-center gap-4">
                            <!-- Green background icon wrapper -->
                            <div class="bg-[#009b3a] p-3 rounded-xl">
                                <i data-lucide="send" class="w-8 h-8 text-[#fedf00]"></i>
                            </div>
                            <div class="text-left">
                                <span class="block text-2xl font-black text-white">Enviar PIX</span>
                                <span class="block text-sm text-[#fedf00] font-semibold">Pagar alguém</span>
                            </div>
                        </div>
                        <i data-lucide="chevron-right" class="w-8 h-8 text-white"></i>
                    </button>
                </div>

                <!-- Tutorial Card: Uses Haiti/Brazil soft colors -->
                <div class="bg-amber-50 border-l-4 border-[#fedf00] p-4 rounded-r-xl shadow-sm">
                    <div class="flex gap-2">
                        <i data-lucide="info" class="w-6 h-6 text-[#002060] flex-shrink-0"></i>
                        <div>
                            <p class="font-black text-[#002060] text-base">Dica para começar:</p>
                            <p class="text-sm text-slate-800 mt-1">Toque no botão grande azul <strong>"Enviar PIX"</strong> acima para começar o treino.</p>
                        </div>
                    </div>
                </div>

            </div>

        </main>

        <!-- Footer: Safety Warning with Red Text (Haiti Red) -->
        <footer class="bg-slate-100 p-4 text-center border-t border-slate-200">
            <p class="text-xs font-black text-red-600 uppercase tracking-wider flex items-center justify-center gap-1">
                <i data-lucide="shield-alert" class="w-4 h-4"></i>
                Ambiente de Teste Seguro • Sem Dinheiro Real
            </p>
        </footer>
    </div>

    <!-- Script -->
    <script>
        lucide.createIcons();

        function irParaTela(idTela) {
            alert("Muito bem! Você clicou para avançar. No próximo passo vamos programar a tela de escolha de chaves!");
        }
    </script>
</body>
</html>
